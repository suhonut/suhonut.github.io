<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            position: relative;
            margin: 50px;
        }

        .curved-text {
            position: absolute;
            left: 0;
            top: -30px;
            transform-origin: bottom center;
        }

        .curved-text span {
            position: absolute;
            transform-origin: bottom center;
            font-size: 24px;
        }

        .main-text {
            font-size: 32px;
            margin-left: 120px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="curved-text" id="curvedText"></div>
        <h1 class="main-text">생일파티</h1>
    </div>

    <script>
        const text = "짱구의";
        const curvedText = document.getElementById('curvedText');
        const radius = 50;
        const chars = text.split('');

        chars.forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char;
            const angle = -Math.PI / 2 + (i / (chars.length - 1)) * (Math.PI / 2);
            const x = radius * Math.cos(angle);
            const y = radius * Math.sin(angle);
            span.style.left = `${x}px`;
            span.style.top = `${y}px`;
            span.style.transform = `rotate(${angle + Math.PI / 2}rad)`;
            curvedText.appendChild(span);
        });
    </script>
</body>
</html>
